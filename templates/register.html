<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar — Stimulasi Kognitif</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f0fe 0%, #d4e4fc 50%, #c0d6f9 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08), 0 2px 12px rgba(0, 0, 0, 0.04);
            padding: 48px 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .register-icon {
            font-size: 3.5rem;
            margin-bottom: 12px;
            display: block;
        }

        .register-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .register-subtitle {
            font-size: 1.15rem;
            color: #666;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block !important;
            position: static !important;
            transform: none !important;
            font-size: 1.15rem !important;
            font-weight: 600;
            color: #333 !important;
            margin-bottom: 10px;
        }

        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group input[type="tel"] {
            width: 100% !important;
            padding: 18px 20px !important;
            font-size: 1.25rem !important;
            border: 2px solid #ddd !important;
            border-bottom: 2px solid #ddd !important;
            border-radius: 14px !important;
            background: #fafbfc !important;
            color: #222 !important;
            outline: none !important;
            height: auto !important;
            box-sizing: border-box !important;
            margin: 0 !important;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="password"]:focus,
        .form-group input[type="tel"]:focus {
            border-color: #2e7d32 !important;
            border-bottom-color: #2e7d32 !important;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.15) !important;
            background: #fff !important;
        }

        .form-group input::placeholder {
            color: #aaa;
            font-size: 1.1rem;
        }

        .phone-input-group {
            display: flex;
            align-items: stretch;
            gap: 0;
        }

        .phone-prefix {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            font-size: 1.25rem;
            font-weight: 700;
            color: #333;
            background: #e8f0fe;
            border: 2px solid #ddd;
            border-right: none;
            border-radius: 14px 0 0 14px;
            white-space: nowrap;
            user-select: none;
        }

        .phone-input-group input[type="tel"] {
            border-radius: 0 14px 14px 0 !important;
            border-left: none !important;
            flex: 1;
        }

        .phone-input-group input[type="tel"]:focus {
            border-color: #2e7d32 !important;
        }

        .phone-input-group:focus-within .phone-prefix {
            border-color: #2e7d32;
            background: #e8f5e9;
        }

        .register-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.35);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .login-link {
            display: block;
            text-align: center;
            margin-top: 28px;
            font-size: 1.1rem;
            color: #555;
        }

        .login-link a {
            color: #2e7d32;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .toast {
            font-size: 1.1rem !important;
            border-radius: 12px !important;
            padding: 14px 24px !important;
        }

        @media (max-width: 520px) {
            .register-card {
                padding: 36px 24px;
                border-radius: 18px;
            }

            .register-title {
                font-size: 1.7rem;
            }

            .form-group input {
                padding: 16px 16px;
                font-size: 1.15rem;
            }

            .register-btn {
                padding: 16px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="register-card">
        <div class="register-header">
            <span class="register-icon">📋</span>
            <div class="register-title">Buat Akun Baru</div>
            <div class="register-subtitle">Daftar untuk mulai menggunakan</div>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <ul id="flash-messages" style="display:none;">
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label for="username">👤 Username</label>
                <input type="text" name="username" id="username" placeholder="Pilih username" required
                    autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">🔒 Password</label>
                <input type="password" name="password" id="password" placeholder="Buat password" required
                    autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="phone_number">📱 Nomor WhatsApp</label>
                <div class="phone-input-group">
                    <span class="phone-prefix">+62</span>
                    <input type="tel" name="phone_number" id="phone_number" placeholder="81234567890"
                        pattern="[0-9]{9,13}" title="Masukkan nomor telepon tanpa 0 di depan (contoh: 81234567890)"
                        autocomplete="tel">
                </div>
            </div>
            <button class="register-btn" type="submit">Daftar</button>
        </form>

        <div class="login-link">
            Sudah punya akun? <a href="{{ url_for('login') }}">Masuk di sini</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var flashList = document.getElementById('flash-messages');
            if (flashList) {
                for (var i = 0; i < flashList.children.length; i++) {
                    var msg = flashList.children[i].innerText;
                    M.toast({ html: msg, displayLength: 5000 });
                }
            }
        });
    </script>
</body>

</html>
