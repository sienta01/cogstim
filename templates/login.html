<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk — Stimulasi Kognitif</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f0fe 0%, #d4e4fc 50%, #c0d6f9 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08), 0 2px 12px rgba(0, 0, 0, 0.04);
      padding: 48px 40px;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-icon {
      font-size: 3.5rem;
      margin-bottom: 12px;
      display: block;
    }

    .login-title {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 1.15rem;
      color: #666;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block !important;
      position: static !important;
      transform: none !important;
      font-size: 1.15rem !important;
      font-weight: 600;
      color: #333 !important;
      margin-bottom: 10px;
    }

    .form-group input[type="text"],
    .form-group input[type="password"] {
      width: 100% !important;
      padding: 18px 20px !important;
      font-size: 1.25rem !important;
      border: 2px solid #ddd !important;
      border-bottom: 2px solid #ddd !important;
      border-radius: 14px !important;
      background: #fafbfc !important;
      color: #222 !important;
      outline: none !important;
      height: auto !important;
      box-sizing: border-box !important;
      margin: 0 !important;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-group input[type="text"]:focus,
    .form-group input[type="password"]:focus {
      border-color: #4a7bec !important;
      border-bottom-color: #4a7bec !important;
      box-shadow: 0 0 0 3px rgba(74, 123, 236, 0.15) !important;
      background: #fff !important;
    }

    .form-group input::placeholder {
      color: #aaa;
      font-size: 1.1rem;
    }

    .login-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.3rem;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, #4a7bec 0%, #3a5bc7 100%);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(74, 123, 236, 0.35);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .register-link {
      display: block;
      text-align: center;
      margin-top: 28px;
      font-size: 1.1rem;
      color: #555;
    }

    .register-link a {
      color: #4a7bec;
      font-weight: 600;
      text-decoration: none;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    /* Flash message toast styling */
    .toast {
      font-size: 1.1rem !important;
      border-radius: 12px !important;
      padding: 14px 24px !important;
    }

    /* Responsive adjustments */
    @media (max-width: 520px) {
      .login-card {
        padding: 36px 24px;
        border-radius: 18px;
      }

      .login-title {
        font-size: 1.7rem;
      }

      .form-group input {
        padding: 16px 16px;
        font-size: 1.15rem;
      }

      .login-btn {
        padding: 16px;
        font-size: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="login-header">
      <span class="login-icon">🧠</span>
      <div class="login-title">Stimulasi Kognitif</div>
      <div class="login-subtitle">Silakan masuk ke akun Anda</div>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <ul id="flash-messages" style="display:none;">
      {% for message in messages %}
      <li>{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label for="username">👤 Username</label>
        <input type="text" name="username" id="username" placeholder="Masukkan username" required
          autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">🔒 Password</label>
        <input type="password" name="password" id="password" placeholder="Masukkan password" required
          autocomplete="current-password">
      </div>
      <button class="login-btn" type="submit">Masuk</button>
    </form>

    <div class="register-link">
      Belum punya akun? <a href="{{ url_for('register') }}">Daftar di sini</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var flashList = document.getElementById('flash-messages');
      if (flashList) {
        for (var i = 0; i < flashList.children.length; i++) {
          var msg = flashList.children[i].innerText;
          M.toast({ html: msg, displayLength: 5000 });
        }
      }
    });
  </script>
</body>

</html>
